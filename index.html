<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Solver - Full Features</title>
    <script src="https://unpkg.com/@otplib/preset-browser@^12.0.0/buffer.js"></script>
    <script src="https://unpkg.com/@otplib/preset-browser@^12.0.0/index.js"></script>
    <script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #10b981;
            --accent: #8b5cf6;
            --dark: #1e293b;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
        }
        h2 { text-align: center; color: var(--dark); margin-bottom: 24px; }
        
        .input-area {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .btn-paste {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 0 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .action-btn {
            padding: 12px;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .bg-scan { background-color: var(--secondary); }
        .bg-upload { background-color: var(--accent); }

        .otp-display-box {
            background: #f8fbff;
            padding: 30px 10px;
            border-radius: 18px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
            border: 1px solid #ebf4ff;
        }
        #otp-code {
            font-size: 4rem;
            font-weight: 800;
            color: var(--primary);
            display: block;
            letter-spacing: 2px;
            font-family: monospace;
        }
        .hint { font-size: 0.8rem; color: #94a3b8; margin-top: 10px; font-weight: 500; }

        #progress-container {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            display: none;
        }
        #progress-bar {
            height: 100%;
            width: 100%;
            background: var(--primary);
            transition: width 1s linear;
        }

        canvas {
            width: 100%;
            border-radius: 12px;
            display: none;
            margin-bottom: 15px;
        }
        .footer { text-align: center; margin-top: 20px; font-size: 0.8rem; color: #64748b; }
    </style>
</head>
<body>

<div class="card">
    <h2>2FA Solver</h2>
    
    <div class="input-area">
        <input type="text" id="secret-input" placeholder="Paste Secret Key here...">
        <button class="btn-paste" onclick="pasteText()">📋 Paste</button>
    </div>

    <div class="btn-grid">
        <button class="action-btn bg-scan" onclick="startCamera()">📸 Camera</button>
        <button class="action-btn bg-upload" onclick="document.getElementById('file-input').click()">📁 Upload</button>
    </div>
    
    <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFile(event)">
    <canvas id="canvas"></canvas>

    <div class="otp-display-box" onclick="copyOTP()">
        <span id="otp-code">------</span>
        <div class="hint" id="status-hint">CLICK TO COPY</div>
    </div>
    
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div class="footer">
        Powered by otplib & jsQR
    </div>
</div>

<script>
    const { totp } = otplib;
    const secretInput = document.getElementById('secret-input');
    const otpCode = document.getElementById('otp-code');
    const statusHint = document.getElementById('status-hint');
    const progressBar = document.getElementById('progress-bar');
    const progressContainer = document.getElementById('progress-container');

    // Auto-load
    window.onload = () => {
        const saved = localStorage.getItem('saved_2fa_secret');
        if (saved) { secretInput.value = saved; updateOTP(); }
    };

    function updateOTP() {
        const secret = secretInput.value.trim().replace(/\s/g, '').toUpperCase();
        if (!secret) {
            otpCode.innerText = "------";
            progressContainer.style.display = "none";
            return;
        }

        try {
            otpCode.innerText = totp.generate(secret);
            localStorage.setItem('saved_2fa_secret', secret);
            
            const epoch = Math.floor(Date.now() / 1000);
            const secondsLeft = 30 - (epoch % 30);
            progressBar.style.width = (secondsLeft / 30 * 100) + "%";
            progressContainer.style.display = "block";
            
            if (statusHint.innerText !== "COPIED!") {
                statusHint.innerText = `Updates in ${secondsLeft}s`;
            }
        } catch (e) {
            otpCode.innerText = "ERROR";
            progressContainer.style.display = "none";
        }
    }

    async function copyOTP() {
        if (otpCode.innerText === "------") return;
        await navigator.clipboard.writeText(otpCode.innerText);
        const originalHint = statusHint.innerText;
        statusHint.innerText = "COPIED!";
        statusHint.style.color = "var(--secondary)";
        setTimeout(() => {
            statusHint.innerText = originalHint;
            statusHint.style.color = "#94a3b8";
        }, 1500);
    }

    async function pasteText() {
        try {
            const text = await navigator.clipboard.readText();
            secretInput.value = text.trim();
            updateOTP();
        } catch (e) { alert("Please allow clipboard access"); }
    }

    function handleFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const cvs = document.getElementById("canvas");
                const ctx = cvs.getContext("2d");
                cvs.width = img.width; cvs.height = img.height;
                ctx.drawImage(img, 0, 0);
                const code = jsQR(ctx.getImageData(0,0,cvs.width,cvs.height).data, cvs.width, cvs.height);
                if(code) {
                    processQRData(code.data);
                } else { alert("QR Code not found!"); }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function startCamera() {
        const cvs = document.getElementById("canvas");
        const ctx = cvs.getContext("2d");
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
            const video = document.createElement("video");
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            video.play();
            cvs.style.display = "block";
            function scan() {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    cvs.height = video.videoHeight; cvs.width = video.videoWidth;
                    ctx.drawImage(video, 0, 0);
                    const code = jsQR(ctx.getImageData(0,0,cvs.width,cvs.height).data, cvs.width, cvs.height);
                    if (code) {
                        processQRData(code.data);
                        stream.getTracks().forEach(t => t.stop());
                        cvs.style.display = "none";
                        return;
                    }
                }
                if(cvs.style.display !== "none") requestAnimationFrame(scan);
            }
            requestAnimationFrame(scan);
        });
    }

    function processQRData(data) {
        if (data.includes("secret=")) {
            const url = new URL(data);
            secretInput.value = url.searchParams.get("secret");
        } else {
            secretInput.value = data;
        }
        updateOTP();
    }

    setInterval(updateOTP, 1000);
    secretInput.addEventListener('input', updateOTP);
</script>
</body>
</html>
